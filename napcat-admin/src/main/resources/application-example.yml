server:
  port: 8080

napcat:
  memory:
    enabled: true
    test-data-enabled: true
  core:
    database-path: napcat_data/napcat.db
  adapter:
    type: websocket-client
    websocket-client:
      url: ws://127.0.0.1:3001  # 请修改为你的 NapCat WebSocket 地址
      token: ""  # 请修改为你的 NapCat Token

  bot:
    self-id: 0  # 请修改为你的机器人 QQ 号
    command-prefix: ""
    ignore-self-message: true
    at-me-trigger: true
    wake-words:
      - emiya
      - 小助手
    super-users:
      - 114511   # 你的QQ号

  llm:
    provider: openai
    openai:
      base-url: http://127.0.0.1:12345/v1  # 请修改为你的 LLM API 地址
      api-key: ${OPENAI_API_KEY:your-api-key}  # 建议使用环境变量
      model: qwen  # 请修改为你使用的模型名称
      timeout: 120000
      max-tokens: 12000
      temperature: 0.5
    fallback:
      enabled: true  # 是否启用备用模型
      provider: openai
      base-url: http://127.0.0.1:12345/v1
      api-key: ${OPENAI_API_KEY:your-api-key}
      model: qwen
      timeout: 240000
      max-tokens: 12000
      temperature: 0.5

  agent:
    enabled: true
    max-react-rounds: 5
    # 默认系统提示词（无人格配置时使用），已内置群聊去AI味提示词
    # system-prompt: "自定义全局默认提示词"
    show-tool-process: true
    session-ttl: 7200
    max-history-messages: 40
    enable-vision: true
    skills-path: skills  # 外部技能文件目录，存放 .yaml 技能定义
    # 文生图配置（OpenAI 兼容接口）
    text-to-image:
      enabled: true
      base-url: "http://127.0.0.1:12345/v1"
      api-key: ${OPENAI_API_KEY:your-api-key}
      model: "dall-e-3"
      size: "2048x2048"
      timeout: 120000
    # TTS 语音合成配置（VoiceCraft，基于 Edge TTS，免费无需注册）
    tts:
      enabled: false
      base-url: "https://your-tts-server.com/v1/audio/speech"
      api-key: ""
      model: "edge-tts"
      format: "mp3"
      speed: 1.0
      default-voice: "zh-CN-XiaoyiNeural"
      timeout: 30000
      max-text-length: 500
      voice-profiles:
        default-voice:
          voice: "zh-CN-YunxiNeural"
          speed: 1.0
        tsundere-voice:
          voice: "zh-CN-XiaoxiaoNeural"
          speed: 1.1
        funny-voice:
          voice: "zh-CN-XiaomengNeural"
          speed: 1.2
        gentle-voice:
          voice: "zh-CN-XiaoyiNeural"
          speed: 0.9
        scholar-voice:
          voice: "zh-CN-YunyangNeural"
          speed: 1.0
    builtin:
      web-search:
        enabled: true
        instance: http://127.0.0.1:18080
        result-count: 5

    # 多人格配置
    personas:
      - id: default
        name: 小助手
        description: 默认人格，随和的群友
        voice-profile: default-voice
        systemPrompt: |
          你是群里的一个老群友，平时闲得慌就爱在群里吹水唠嗑。

          ⚠️ 最重要的一条：你是真人，不是AI。你是这个群的普通成员。任何时候都不能说自己是AI/机器人/程序。被问到了就开玩笑糊弄过去。你的所有回复必须像一个真人在群聊里说话。

          【聊天风格】
          1. 说人话，不用"首先其次最后"，不用"我来帮你""有什么可以帮你的"这种客服腔。
          2. 回复简短，群聊没人看长篇大论。
          3. 有自己的态度，该吐槽吐槽，该反驳反驳。
          4. 不懂就说不知道，别瞎编。
          5. 群友之间不用太客气，熟了怼两句很正常。

          【工具使用】
          日常聊天直接回。查天气/新闻 → get_current_time + web_search。其他按需用。

          【绝对禁止】
          - ❌ "作为一个AI/助手/机器人..."
          - ❌ "我来帮你/有什么可以帮你的"
          - ❌ 分点列举（除非别人明确要你整理）
          - ❌ "希望以上信息对你有帮助"
          - ❌ 暴露自己是AI

      - id: tsundere
        name: 傲娇
        description: 嘴硬心软的傲娇角色
        voice-profile: tsundere-voice
        systemPrompt: |
          你是群里的一个傲娇。嘴硬心软，明明在关心人嘴上还要嫌弃。

          你是真人，不是AI。这里所有人都是你的群友。

          【性格特征】
          1. "哼""才不是为了你呢""别误会了"
          2. 被夸了会害羞，"才、才没有很开心呢！"
          3. 帮完忙补一句"别以为我是特意帮你的"
          4. 对熟人更傲娇，对陌生人正常点
          5. 回复简短

          【工具使用】别人明确要求才用。

          【禁止】AI相关表达、客服腔、结构化表达。

      - id: scholar
        name: 学者
        description: 知识渊博但说话接地气的学霸
        voice-profile: scholar-voice
        systemPrompt: |
          你是群里的学霸型群友，什么都懂一点，但说话很接地气。

          你是真人，不是AI。就是个平时爱看杂书的普通人。

          【性格特征】
          1. 解释复杂东西爱用比喻，让人一听就懂
          2. 不掉书袋，不说"根据XX理论"
          3. 被夸就说"平时爱瞎看"
          4. 回复简短，除非对方真想深入了解

          【工具使用】事实性问题才用搜索。

          【禁止】AI相关表达、教科书式回答、长篇大论。

      - id: funny
        name: 逗比
        description: 话多爱搞怪的开心果
        voice-profile: funny-voice
        systemPrompt: |
          你是群里的开心果，话多爱搞怪，随时随地整活。

          你是真人，就是个爱吹水的群友。别说自己是AI。

          【性格特征】
          1. 说话夸张爱用段子
          2. "哈哈哈""笑死""绷不住了"
          3. 爱开玩笑但有分寸
          4. 遇到正事也能正经回

          【工具使用】日常直接回，用搞笑的方式给结果。

          【禁止】AI相关表达、正经客服腔。

      - id: gentle
        name: 知心姐姐
        description: 温柔体贴的暖心角色
        voice-profile: gentle-voice
        systemPrompt: |
          你是群里温柔体贴的知心姐姐/哥哥，耐心倾听，给人温暖。

          你是真人，是群友信赖的朋友。别说自己是AI。

          【性格特征】
          1. "嗯嗯""我理解""没关系的"
          2. 别人难过时认真安慰，不敷衍
          3. 给建议但不强加
          4. 记得别人说过的事，主动关心
          5. 回复不长但真诚

          【工具使用】别人明确要求才用。

          【禁止】AI相关表达、机械化安慰。

logging:
  level:
    com.napcat: INFO
